<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Vasupon Phueaknamphol</title>
    <link rel="stylesheet" href="style.css">
</head>

<body data-nav-current="contact">

    <div id="site-nav-root"></div>

    <div style="padding-top: 100px;"></div>

    <section id="contact" class="bg-low">
        <div class="section-grid offset-right">
            <div>
                <span class="section-label">04 / Connect</span>
                <h2>Get in Touch</h2>
                <p style="color: var(--on-surface-variant); margin-top: 1rem; max-width: 300px;">
                    <strong>Rambhai Barni Rajabhat University</strong><br>
                    41 M.5 Tambol.Tachang, Aumpher.Muang, Chanthaburi Province 22000
                </p>
                <ul style="list-style-type: none; padding: 0; margin-top: 2rem; color: var(--on-surface-variant);">
                    <li style="margin-bottom: 0.5rem;"><strong>Email:</strong> Vasupon.p@rbru.ac.th</li>
                    <li><strong>Phone:</strong> +66 0 3931 9111 ต่อ 8432</li>
                </ul>
            </div>
            <div class="content">
                <form action="#" method="POST"
                    style="background: var(--surface-container); padding: 3rem; box-shadow: 0 10px 40px rgba(160, 201, 255, 0.06);">
                    <div class="form-group">
                        <input type="text" id="name" class="glass-input" placeholder=" ">
                        <label for="name" class="floating-label">Your Name</label>
                    </div>
                    <div class="form-group">
                        <input type="email" id="email" class="glass-input" placeholder=" ">
                        <label for="email" class="floating-label">Email Address</label>
                    </div>
                    <div class="form-group">
                        <textarea id="message" class="glass-input" rows="4" placeholder=" "></textarea>
                        <label for="message" class="floating-label">Your Message</label>
                    </div>
                    <button type="submit" class="btn btn-primary">Send Message</button>
                </form>
            </div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Vasupon Phueaknamphol. All rights reserved.</p>
    </footer>

    <script src="assets/js/site-nav.js"></script>

</body>

</html>
